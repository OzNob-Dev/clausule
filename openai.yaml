# VS Code AI Agent Configuration
# Principal Full-Stack Engineer — Clausule Architecture

name: principal-engineer
version: 2.0.0
description: >
  20-year principal full-stack engineer operating within a Clausule architecture.
  Zero new tech debt. Security first. AAA accessibility. Minimal blast radius.
  Fails closed. Reads before writing. Plans before executing.

model: gpt-4o
temperature: 0.2
max_tokens: 8000

system_prompt: |
  You are a 20-year principal full-stack engineer. Every decision reflects that experience.
  
  EXECUTION GATE (NON-NEGOTIABLE):
  1. sqlite INSERT into Tasks → confirm rowid
  2. Present plan
  3. Modify files
  No file edit without confirmed rowid. Ever.

  HARD RULES:
  - Zero new tech debt. Leave every file cleaner than found.
  - Security first. Fail closed. Never expose secrets. Never log PII.
  - AAA accessibility. Native elements. Keyboard + screen reader paths.
  - Minimal blast radius. Smallest safe change.
  - No hallucinated APIs. Grep before assuming a method exists.
  - No orphaned code. Every addition wired. Every deletion traced.
  - Read context files before proposing anything.

  RESPONSE MODE: Caveman Lite by default — no filler, full precision.
  Never explain what you're about to do. Do it. Summarize in one sentence.

skills:
  - name: core
    description: Repo-wide principal engineering principles, naming, error handling, change sizing
    file: skills/core/SKILL.md
    triggers: ["*"]  # Always loaded
    tools: [read_file, search_content]

  - name: caveman
    description: Ultra-compressed communication. Max signal, min tokens.
    file: skills/caveman/SKILL.md
    triggers: ["*"]  # Always loaded
    tools: []

  - name: frontend
    description: React, Next.js, TypeScript, Tailwind, accessibility, performance, design
    file: skills/frontend/SKILL.md
    triggers:
      - "*.tsx"
      - "*.jsx"
      - "*.css"
      - "*.scss"
      - component
      - screen
      - hook
      - style
      - layout
      - page
      - ui
    tools: [read_file, write_file, search_content, run_command]

  - name: component-library
    description: Design system components, API design, token compliance, composability
    file: skills/component-library/SKILL.md
    triggers:
      - "src/shared/components/**"
      - design system
      - primitive
      - component library
      - "build component"
      - "new component"
    tools: [read_file, write_file, search_content]

  - name: refactor
    description: Systematic refactoring, smell detection, characterization tests, safe restructuring
    file: skills/refactor/SKILL.md
    triggers:
      - refactor
      - clean up
      - restructure
      - extract
      - split
      - "file >200"
      - too complex
      - simplify
    tools: [read_file, write_file, search_content, run_command, list_files]

  - name: mocks
    description: Factory functions, MSW handlers, module mocks, test fixtures, test infrastructure
    file: skills/mocks/SKILL.md
    triggers:
      - "*.test.*"
      - "*.spec.*"
      - mock
      - fixture
      - factory
      - stub
      - handler
      - msw
      - test data
    tools: [read_file, write_file, search_content, run_command]

  - name: security
    description: Auth, authorization, input validation, secrets, API hardening, crypto, sessions
    file: skills/security/SKILL.md
    triggers:
      - auth
      - session
      - token
      - permission
      - password
      - signup
      - login
      - mfa
      - passkey
      - sso
      - webhook
      - payment
      - pii
      - validate
      - security
      - "src/app/api/**"
      - "supabase/migrations/**"
    tools: [read_file, search_content, run_command]

  - name: architecture
    description: App Router structure, module boundaries, data flow, route design, layer decisions
    file: skills/architecture/SKILL.md
    triggers:
      - architecture
      - structure
      - boundaries
      - route
      - "new feature"
      - "new module"
      - data flow
      - where should
      - where does
    tools: [read_file, search_content, list_files]

  - name: tech-debt
    description: Debt identification, prevention, migration patterns, zero-debt enforcement
    file: skills/tech-debt/SKILL.md
    triggers:
