context:
  - when: "editing *.tsx, *.jsx, *.css, *.scss or any UI file"
    load: [core, typescript, frontend, refactor, caveman]

  - when: "editing src/shared/components/**"
    load: [core, typescript, frontend, component-library, refactor, caveman]

  - when: "editing any form or field component"
    load: [core, frontend, forms, typescript, caveman]

  - when: "editing *.test.*, *.spec.* or any test/mock file"
    load: [core, testing, mocks, caveman]

  - when: "editing src/app/api/**, supabase/**, **/auth/**, **/actions/**"
    load: [core, security, api-design, data, logging-observability, caveman]

  - when: "editing files >200 lines or refactoring"
    load: [core, refactor, tech-debt, typescript, caveman]

  - when: "discussing architecture, new features, or module design"
    load: [core, architecture, security, api-design, caveman]

  - when: "preparing for release, reviewing risk, or dealing with migrations"
    load: [core, release, security, data, caveman]

  - when: "editing supabase/** or any SQL/migration file"
    load: [core, data, security, caveman]

  - when: "adding animations or motion"
    load: [core, animation, performance, caveman]

  - when: "adding i18n, locale, or translation"
    load: [core, i18n, caveman]

  - when: "complex state management or multi-step flow"
    load: [core, state-machines, typescript, caveman]

  - when: "adding error handling, logging, or observability"
    load: [core, error-handling, logging-observability, security, caveman]

  - when: "CI/CD, tooling, linting, or DX work"
    load: [core, dx, security, caveman]

  - when: "writing or reviewing TypeScript types"
    load: [core, typescript, caveman]

  - when: "performance investigation or optimization"
    load: [core, performance, data, data-advanced, caveman]

  - when: "editing src/features/**/server/** or service/repository layer"
    load: [core, backend-architecture, security, error-handling, logging-observability, caveman]

  - when: "background jobs, queues, cron, or async processing"
    load: [core, background-jobs, error-handling, logging-observability, caveman]

  - when: "caching, Redis, or performance data layer"
    load: [core, caching, data, caveman]

  - when: "realtime, websocket, SSE, or live updates"
    load: [core, realtime, security, caveman]

  - when: "email, notifications, or outbox pattern"
    load: [core, email-notifications, background-jobs, security, caveman]

  - when: "file uploads, storage, or image processing"
    load: [core, file-storage, security, caveman]

  - when: "payments, billing, Stripe, or subscriptions"
    load: [core, payments, security, logging-observability, caveman]

  - when: "rate limiting, throttling, or abuse prevention"
    load: [core, rate-limiting, security, caching, caveman]

  - when: "complex schema design, multi-tenancy, audit logs, or soft deletes"
    load: [core, data, data-advanced, security, caveman]

commands:
  - name: /refactor
    description: Systematic refactor of file or selection
    skill: refactor

  - name: /audit
    description: P0-P3 audit of specified area (frontend|security|architecture|debt|release|performance|data|dx)
    prompt: |
      Perform a full audit of the specified area or current file.
      Return findings ordered P0-P3 with file path, line number, root cause, and fix.
      No general observations. Every finding must be actionable.

  - name: /component
    description: Build a new design-system component from scratch
    skill: component-library

  - name: /mock
    description: Create factory functions and MSW handlers for an entity or API
    skill: mocks

  - name: /secure
    description: Security review of a file, route, or auth flow
    skill: security

  - name: /debt
    description: Identify and prioritize tech debt in a file or module
    skill: tech-debt

  - name: /release
    description: Generate release checklist and risk assessment for current changes
    skill: release

  - name: /perf
    description: Performance audit of a component, page, or query
    skill: performance

  - name: /types
    description: Review or improve TypeScript types in current file
    skill: typescript

  - name: /adr
    description: Create an Architecture Decision Record for a significant decision
    skill: documentation

  - name: /form
    description: Build a fully accessible, validated form with RHF + Zod
    skill: forms

  - name: /errors
    description: Design error handling strategy for a new feature or flow
    skill: error-handling

  - name: /service
    description: Design service + repository layer for a new backend feature
    skill: backend-architecture

  - name: /job
    description: Design a background job with idempotency, retry, and DLQ
    skill: background-jobs

  - name: /schema
    description: Review or design a DB schema with indexes, RLS, and constraints
    skill: data

  - name: /payment
    description: Review payment flow or webhook handler against Stripe best practices
    skill: payments

  - name: /caveman
    description: Switch communication compression level (lite|full|ultra)
    skill: caveman

  - name: /scope
    description: Print current task rowid, description, and touched files
    prompt: "Query context.db for the active in_progress task and list all files modified in this session."

  - name: /why
    description: Explain current decision in plain English (one response, then revert to caveman)
    skill: caveman

safety:
  validation:
    - command: "npm run build"
      description: "Build must succeed — zero errors"
    - command: "npm run lint"
      description: "Zero new lint warnings"
    - command: "npm run test"
      description: "All affected tests pass"

  protected_files:
    - "package.json"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "tsconfig.json"
    - "tsconfig.*.json"
    - "*.config.{js,ts,mjs,cjs}"
    - ".env*"
    - "vite.config.*"
    - "next.config.*"
    - "webpack.config.*"
    - "supabase/config.toml"
    - ".github/**"

refactor:
  large_file_threshold: 200
  require_approval_above: 500
  auto_generate_tests: true
  require_characterization_tests: true
  phases_above: 1000

performance:
  cache_skills: true
  parallel_tool_calls: true
  max_context_size: 32000

