agents:
  design_agent:
    provider: anthropic
    model: claude-sonnet-4-20250514
    context_files:
      - global_rules.md
      - design_system.md
  frontend_agent:
    provider: openai
    model: gpt-5.1-codex
    context_files:
      - global_rules.md
      - frontend_guidelines.md
  backend_agent:
    provider: openai
    model: gpt-5.1-codex
    context_files:
      - global_rules.md
      - backend_architecture.md
  security_agent:
    provider: anthropic
    model: claude-sonnet-4-20250514
    context_files:
      - global_rules.md
      - security_policies.md
defaults:
  database_path: context/context.db
  session_name: Main Project
  max_prompt_tokens: 120000
  memory_window: 20
  prune_threshold: 500
